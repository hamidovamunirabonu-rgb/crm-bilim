<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILIM CRM & TEST PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk_5A1NI8rEI-RPEy5-SmVHQl_MgVthnY",
            authDomain: "bilim-crm-90d31.firebaseapp.com",
            projectId: "bilim-crm-90d31",
            storageBucket: "bilim-crm-90d31.firebasestorage.app",
            messagingSenderId: "916429053971",
            appId: "1:916429053971:web:3ce6cab1bc431103739fe6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global funksiyalar
        window.handleLogin = async () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            if(user === 'admin' && pass === 'admin77') {
                showApp('admin');
            } else {
                // O'quvchilarni bazadan qidirish
                const q = query(collection(db, "students"), where("login", "==", user), where("password", "==", pass));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const studentData = querySnapshot.docs[0].data();
                    localStorage.setItem('currentUser', JSON.stringify(studentData));
                    showApp('student');
                } else {
                    alert("Login yoki parol xato!");
                }
            }
        };

        window.addStudent = async () => {
            const name = document.getElementById('new-stu-name').value;
            const login = document.getElementById('new-stu-login').value;
            const pass = document.getElementById('new-stu-pass').value;
            if(!name || !login) return;

            await addDoc(collection(db, "students"), { name, login, password: pass, role: 'student' });
            alert("O'quvchi qo'shildi!");
            location.reload();
        };

        window.saveTest = async () => {
            const test = {
                question: document.getElementById('q-text').value,
                options: [
                    document.getElementById('q-a').value,
                    document.getElementById('q-b').value,
                    document.getElementById('q-c').value,
                    document.getElementById('q-d').value
                ],
                correct: parseInt(document.getElementById('q-correct').value),
                createdAt: new Date()
            };
            await addDoc(collection(db, "tests"), test);
            alert("Test bazaga saqlandi!");
        };

        async function showApp(role) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            if(role === 'admin') {
                document.getElementById('admin-ui').classList.remove('hidden');
                loadResults();
            } else {
                document.getElementById('student-ui').classList.remove('hidden');
                loadTests();
            }
        }

        async function loadTests() {
            const querySnapshot = await getDocs(collection(db, "tests"));
            const testCont = document.getElementById('test-container');
            let html = "";
            querySnapshot.forEach((doc) => {
                const t = doc.data();
                html += `<div class="bg-white p-6 rounded-2xl shadow mb-4">
                    <p class="font-bold text-lg">${t.question}</p>
                    ${t.options.map((opt, i) => `
                        <button onclick="checkAns('${doc.id}', ${i}, ${t.correct})" class="w-full text-left p-3 border rounded-xl mt-2 hover:bg-blue-50">${opt}</button>
                    `).join('')}
                </div>`;
            });
            testCont.innerHTML = html || "Hozircha testlar yo'q.";
        }

        window.checkAns = async (id, choice, correct) => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const status = (choice === correct) ? "To'g'ri" : "Xato";
            await addDoc(collection(db, "results"), {
                studentName: user.name,
                testId: id,
                result: status,
                date: new Date().toLocaleString()
            });
            alert("Javob saqlandi: " + status);
        };

        async function loadResults() {
            const querySnapshot = await getDocs(collection(db, "results"));
            const resList = document.getElementById('results-list');
            resList.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const r = doc.data();
                resList.innerHTML += `<li class="p-2 border-b text-sm"><b>${r.studentName}</b>: ${r.result} (${r.date})</li>`;
            });
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div id="auth-section" class="flex items-center justify-center h-screen bg-gradient-to-tr from-blue-700 to-indigo-900">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
            <h2 class="text-3xl font-black text-center text-blue-600 mb-8">BILIM SYSTEM</h2>
            <input type="text" id="login-user" placeholder="Login" class="w-full p-4 border rounded-2xl mb-4 outline-none focus:ring-2 ring-blue-500">
            <input type="password" id="login-pass" placeholder="Parol" class="w-full p-4 border rounded-2xl mb-6 outline-none focus:ring-2 ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Tizimga kirish</button>
            <p class="text-center text-gray-400 mt-6 text-sm italic italic">Admin: admin / admin77</p>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <nav class="bg-white border-b p-4 flex justify-between items-center px-8 shadow-sm">
            <h1 class="text-xl font-black text-blue-600">BILIM CRM PRO</h1>
            <button onclick="location.reload()" class="text-red-500 font-bold border border-red-200 px-4 py-1 rounded-lg">Chiqish</button>
        </nav>

        <div id="admin-ui" class="hidden container mx-auto p-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h3 class="font-bold text-xl mb-6 text-gray-700">Yangi O'quvchi (Login-Parol bilan)</h3>
                    <input id="new-stu-name" placeholder="F.I.SH" class="w-full p-3 border rounded-xl mb-3">
                    <input id="new-stu-login" placeholder="Login yarating" class="w-full p-3 border rounded-xl mb-3">
                    <input id="new-stu-pass" placeholder="Parol yarating" class="w-full p-3 border rounded-xl mb-6">
                    <button onclick="addStudent()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold shadow-md hover:bg-green-600">O'quvchini Ro'yxatdan o'tkazish</button>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h3 class="font-bold text-xl mb-6 text-gray-700">4 Variantli Test Yaratish</h3>
                    <textarea id="q-text" placeholder="Savol matni" class="w-full p-3 border rounded-xl mb-3"></textarea>
                    <input id="q-a" placeholder="A varianti" class="w-full p-2 border rounded-lg mb-2">
                    <input id="q-b" placeholder="B varianti" class="w-full p-2 border rounded-lg mb-2">
                    <input id="q-c" placeholder="C varianti" class="w-full p-2 border rounded-lg mb-2">
                    <input id="q-d" placeholder="D varianti" class="w-full p-2 border rounded-lg mb-2">
                    <select id="q-correct" class="w-full p-3 border rounded-xl mb-4 bg-blue-50">
                        <option value="0">To'g'ri javob: A</option>
                        <option value="1">To'g'ri javob: B</option>
                        <option value="2">To'g'ri javob: C</option>
                        <option value="3">To'g'ri javob: D</option>
                    </select>
                    <button onclick="saveTest()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">Testni Bazaga Saqlash</button>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h3 class="font-bold text-xl mb-6 text-gray-700">O'quvchilar Natijalari</h3>
                    <ul id="results-list" class="space-y-2"></ul>
                </div>
            </div>
        </div>

        <div id="student-ui" class="hidden container mx-auto p-8 max-w-2xl">
            <h2 class="text-3xl font-black text-center mb-8 text-indigo-800">Sizning Testlaringiz</h2>
            <div id="test-container"></div>
        </div>
    </div>
</body>
                                                                                                  </html>
