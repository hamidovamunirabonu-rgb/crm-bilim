<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS ULTIMATE | Pro ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; border-radius: 24px; }
        .sidebar { background: #0f172a; transition: 0.3s; }
        .input-style { width: 100%; padding: 12px 16px; border-radius: 14px; border: 2px solid #f1f5f9; outline: none; transition: 0.2s; }
        .input-style:focus { border-color: #3b82f6; background: white; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-xl shadow-blue-500/30">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h2 class="text-3xl font-extrabold">Xush kelibsiz</h2>
                <p class="text-slate-400 mt-2">Tizimga kirish uchun ma'lumotlarni kiriting</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email (admin@sirius.uz)" class="input-style">
                <input type="password" id="auth-pass" placeholder="Parol" class="input-style">
                <button onclick="handleAuth()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition">KIRISH</button>
            </div>
            <p class="text-center mt-6 text-xs text-slate-400">Xavfsizlik tizimi: Firebase Identity Platform</p>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <aside class="sidebar w-72 p-6 flex flex-col shrink-0">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <i class="fas fa-rocket text-blue-500 text-2xl"></i>
                <span class="text-white font-black text-xl tracking-tighter">SIRIUS PRO</span>
            </div>
            <nav class="flex-1 space-y-1">
                <button onclick="nav('dash')" class="w-full flex items-center space-x-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-800 hover:text-white transition">
                    <i class="fas fa-chart-pie"></i> <span class="font-bold text-sm">Dashboard</span>
                </button>
                <button onclick="nav('students')" class="w-full flex items-center space-x-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-800 hover:text-white transition">
                    <i class="fas fa-user-graduate"></i> <span class="font-bold text-sm">O'quvchilar</span>
                </button>
                <button onclick="nav('journal')" class="w-full flex items-center space-x-4 p-4 rounded-2xl text-slate-400 hover:bg-slate-800 hover:text-white transition">
                    <i class="fas fa-book"></i> <span class="font-bold text-sm">Kundalik</span>
                </button>
            </nav>
            <button onclick="logout()" class="mt-auto flex items-center space-x-3 p-4 text-red-400 font-bold text-sm hover:bg-red-500/10 rounded-2xl">
                <i class="fas fa-power-off"></i> <span>Chiqish</span>
            </button>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-10">
                <h2 id="page-title" class="text-3xl font-black text-slate-800">Boshqaruv Paneli</h2>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-sm font-black" id="user-display">Munirabonu K.</p>
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Administrator</p>
                    </div>
                </div>
