<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="auth-screen" class="flex items-center justify-center h-screen bg-blue-600">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-80">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Bilim CRM</h2>
            <input type="password" id="pass-input" placeholder="Parol" class="w-full p-2 border rounded mb-4 focus:outline-blue-500">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Kirish</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen">
        <nav class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold italic"><i class="fas fa-university mr-2"></i>Bilim CRM</h1>
                <div class="flex space-x-4 overflow-x-auto">
                    <button onclick="showTab('students')" class="hover:underline px-2"><i class="fas fa-user-graduate"></i></button>
                    <button onclick="showTab('teachers')" class="hover:underline px-2"><i class="fas fa-chalkboard-teacher"></i></button>
                    <button onclick="showTab('sms')" class="hover:underline px-2"><i class="fas fa-sms"></i></button>
                    <button onclick="showTab('stats')" class="hover:underline px-2"><i class="fas fa-chart-line"></i></button>
                    <button onclick="showTab('tests')" class="hover:underline px-2"><i class="fas fa-file-alt"></i></button>
                    <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded-full text-xs">Chiqish</button>
                </div>
            </div>
        </nav>

        <div class="p-4 container mx-auto">
            <section id="students-tab" class="tab-content bg-white p-4 rounded shadow">
                <h2 class="text-lg font-bold mb-4 border-b">Yangi O'quvchi Qo'shish</h2>
                <div class="grid grid-cols-1 gap-2 mb-4">
                    <input type="text" id="stu-name" placeholder="Ism Familiya" class="p-2 border rounded">
                    <select id="stu-subject" class="p-2 border rounded">
                        <option>Matematika</option>
                        <option>Ingliz tili</option>
                        <option>Ona tili</option>
                    </select>
                    <button onclick="addStudent()" class="bg-green-500 text-white p-2 rounded shadow-md"><i class="fas fa-plus"></i> Qo'shish</button>
                </div>
                <h3 class="font-bold mb-2">Ro'yxat</h3>
                <div class="overflow-x-auto"><table class="w-full text-sm border text-left"><thead class="bg-gray-200"><tr><th class="p-2">ISM</th><th class="p-2">FAN</th><th class="p-2">AMAL</th></tr></thead><tbody id="student-list"></tbody></table></div>
            </section>

            <section id="teachers-tab" class="tab-content hidden bg-white p-4 rounded shadow">
                <h2 class="text-lg font-bold mb-4">O'qituvchilar</h2>
                <input type="text" id="teacher-name" placeholder="O'qituvchi ismi" class="w-full p-2 border rounded mb-2">
                <button onclick="addTeacher()" class="w-full bg-blue-500 text-white p-2 rounded mb-4">Qo'shish</button>
                <ul id="teacher-list" class="divide-y border rounded"></ul>
            </section>

            <section id="sms-tab" class="tab-content hidden bg-white p-4 rounded shadow">
                <h2 class="text-lg font-bold mb-4"><i class="fas fa-paper-plane text-blue-500"></i> SMS Xabarnoma</h2>
                <textarea id="sms-text" rows="4" class="w-full border p-2 rounded mb-2" placeholder="Xabarni yozing..."></textarea>
                <button onclick="alert('SMS yuborish uchun API ulanishi kerak!')" class="w-full bg-orange-500 text-white p-3 rounded-lg font-bold">Barchaga SMS yuborish</button>
                <p class="text-xs mt-2 text-gray-500 text-center">Eskiz.uz API orqali ishlaydi</p>
            </section>

            <section id="stats-tab" class="tab-content hidden bg-white p-4 rounded shadow text-center">
                <h2 class="text-lg font-bold mb-4">Statistika</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-blue-100 p-4 rounded"><p class="text-xs">O'quvchilar</p><b id="stat-count" class="text-xl">0</b></div>
                    <div class="bg-green-100 p-4 rounded"><p class="text-xs">To'lovlar</p><b class="text-xl">8.5 mln</b></div>
                </div>
                <canvas id="myChart" width="200" height="200"></canvas>
            </section>

            <section id="tests-tab" class="tab-content hidden bg-white p-4 rounded shadow text-center">
                <h2 class="text-lg font-bold mb-4">Test Natijalari</h2>
                <p class="text-gray-500">Hozircha testlar mavjud emas.</p>
                <button class="mt-4 bg-purple-500 text-white px-4 py-2 rounded">Yangi Test Yaratish</button>
            </section>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass-input').value === '1234') {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                updateStats();
            } else { alert('Xato parol!'); }
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabName + '-tab').classList.remove('hidden');
            if(tabName === 'stats') initChart();
        }

        let students = JSON.parse(localStorage.getItem('stu_db')) || [];

        function addStudent() {
            let name = document.getElementById('stu-name').value;
            let sub = document.getElementById('stu-subject').value;
            if(!name) return;
            students.push({name, sub});
            localStorage.setItem('stu_db', JSON.stringify(students));
            renderStudents();
            document.getElementById('stu-name').value = '';
        }

        function renderStudents() {
            let list = document.getElementById('student-list');
            list.innerHTML = students.map((s, i) => `
                <tr class="border-b">
                    <td class="p-2">${s.name}</td>
                    <td class="p-2">${s.sub}</td>
                    <td class="p-2"><button onclick="delStu(${i})" class="text-red-500"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
            document.getElementById('stat-count').innerText = students.length;
        }

        function delStu(i) { students.splice(i, 1); localStorage.setItem('stu_db', JSON.stringify(students)); renderStudents(); }

        function initChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['To\'lagan', 'Qarzdor'],
                    datasets: [{ data: [70, 30], backgroundColor: ['#22c55e', '#ef4444'] }]
                }
            });
        }

        renderStudents();
    </script>
</body>
</html>
