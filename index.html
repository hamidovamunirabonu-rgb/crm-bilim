<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS ERP | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); }
        .sidebar { background: #0f172a; transition: all 0.3s; }
        .active-nav { background: #1e293b; color: white; border-left: 4px solid #3b82f6; }
        .input-style { width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #f1f5f9; outline: none; transition: 0.2s; }
        .input-style:focus { border-color: #3b82f6; background: #fff; }
        .tab-content { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-xl shadow-blue-500/20">
                <i class="fas fa-rocket"></i>
            </div>
            <h2 class="text-3xl font-black mb-4">SIRIUS PRO</h2>
            
            <div class="flex bg-slate-100 p-1 rounded-2xl mb-6">
                <button id="tab-admin" class="flex-1 py-2 rounded-xl font-bold bg-white shadow-sm text-blue-600 transition">Admin</button>
                <button id="tab-student" class="flex-1 py-2 rounded-xl font-bold text-slate-500 transition">O'quvchi</button>
            </div>

            <div id="form-admin" class="space-y-4">
                <input type="email" id="auth-email" placeholder="Admin Email" class="input-style">
                <input type="password" id="auth-pass" placeholder="Parol" class="input-style">
                <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">KIRISH</button>
            </div>

            <div id="form-student" class="hidden space-y-4">
                <input type="text" id="stu-id-input" placeholder="Telegram ID" class="input-style">
                <button id="stu-login-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition">LOGIN</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <aside class="sidebar w-72 p-6 flex flex-col text-slate-400 shrink-0">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl shadow-lg"></div>
                <span class="text-white font-black text-xl tracking-tight">SIRIUS</span>
            </div>
            <nav class="flex-1 space-y-1">
                <button id="btn-nav-dash" class="w-full flex items-center space-x-4 p-4 rounded-xl active-nav transition"><i class="fas fa-th-large"></i> <span class="font-bold text-sm">Dashboard</span></button>
                <button id="btn-nav-stu" class="w-full flex items-center space-x-4 p-4 rounded-xl hover:text-white transition"><i class="fas fa-users"></i> <span class="font-bold text-sm">O'quvchilar</span></button>
                <button id="btn-nav-test" class="w-full flex items-center space-x-4 p-4 rounded-xl hover:text-white transition"><i class="fas fa-vial"></i> <span class="font-bold text-sm">Test Tizimi</span></button>
                <button id="btn-nav-res" class="w-full flex items-center space-x-4 p-4 rounded-xl hover:text-white transition"><i class="fas fa-chart-bar"></i> <span class="font-bold text-sm">Natijalar</span></button>
            </nav>
            <button id="logout-btn" class="mt-auto p-4 text-red-400 font-bold text-sm hover:bg-red-500/10 rounded-xl transition"><i class="fas fa-sign-out-alt mr-2"></i> Chiqish</button>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <div id="sec-dash" class="tab-content">
                <h2 class="text-3xl font-black mb-8">Monitoring</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-8 border-l-8 border-blue-500">
                        <p class="text-slate-400 text-xs font-black uppercase tracking-widest">Jami O'quvchilar</p>
                        <h3 class="text-5xl font-black mt-2" id="dash-stu-count">0</h3>
                    </div>
                </div>
            </div>

            <div id="sec-stu" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black">O'quvchilar Bazasi</h2>
                    <button id="open-stu-modal" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:scale-105 transition">+ Yangi O'quvchi</button>
                </div>
                <div class="glass-card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] font-black uppercase text-slate-400">
                            <tr><th class="p-4">Ism Familiya</th><th class="p-4">Telegram ID</th><th class="p-4 text-center">Amallar</th></tr>
                        </thead>
                        <tbody id="stu-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="sec-test" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black">Imtihon Markazi</h2>
                    <button id="open-test-modal" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition">+ Savol Qo'shish</button>
                </div>

                <div id="timer-display" class="hidden mb-6 flex items-center justify-center space-x-3 bg-white w-40 mx-auto p-3 rounded-2xl shadow-sm border-2 border-red-100">
                    <i class="fas fa-clock text-red-500 animate-pulse"></i>
                    <span id="time-left" class="text-2xl font-black text-red-600">00:00</span>
                </div>

                <div class="max-w-3xl mx-auto">
                    <div id="quiz-box" class="glass-card p-10 border-t-8 border-blue-600">
                        <h3 id="q-text" class="text-2xl font-bold mb-8 text-slate-800 text-center">Savollar yuklanmoqda...</h3>
                        <div id="q-options" class="grid gap-4"></div>
                    </div>
                    
                    <div id="result-box" class="hidden glass-card p-10 text-center">
                        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                            <i class="fas fa-check-double"></i>
                        </div>
                        <h4 class="text-6xl font-black text-blue-600 mb-2" id="final-percent">0%</h4>
                        <p class="text-slate-400 font-bold mb-8">Test muvaffaqiyatli yakunlandi!</p>
                        <button onclick="location.reload()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black hover:bg-black transition">Bosh sahifaga qaytish</button>
                    </div>
                </div>
            </div>

            <div id="sec-res" class="tab-content hidden">
                <h2 class="text-3xl font-black mb-8">Barcha Natijalar</h2>
                <div class="glass-card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] font-black uppercase text-slate-400">
                            <tr><th class="p-4">O'quvchi</th><th class="p-4">Natija</th><th class="p-4">Sana</th></tr>
                        </thead>
                        <tbody id="res-list"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="stu-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[250] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl">
            <h3 class="text-2xl font-black mb-6">Yangi O'quvchi Ro'yxatdan o'tkazish</h3>
            <input id="s-name" placeholder="F.I.SH" class="input-style mb-4">
            <input id="s-tg" placeholder="Telegram ID" class="input-style mb-6">
            <button id="btn-save-student" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">BAZAGA QO'SHISH</button>
            <button id="close-stu-modal" class="w-full mt-4 text-slate-400 font-bold">Bekor qilish</button>
        </div>
    </div>

    <div id="test-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[250] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg p-8 rounded-[2.5rem] shadow-2xl">
            <h3 class="text-2xl font-black mb-6">Yangi Savol</h3>
            <textarea id="t-q" placeholder="Savol matni..." class="input-style mb-4 h-24"></textarea>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input id="t-a" placeholder="A javob" class="input-style">
                <input id="t-b" placeholder="B javob" class="input-style">
                <input id="t-c" placeholder="C javob" class="input-style">
                <input id="t-d" placeholder="D javob" class="input-style">
            </div>
            <div class="flex gap-4 mb-6">
                <select id="t-correct" class="input-style font-bold text-blue-600">
                    <option value="a">To'g'ri: A</option><option value="b">To'g'ri: B</option>
                    <option value="c">To'g'ri: C</option><option value="d">To'g'ri: D</option>
                </select>
                <input type="number" id="t-duration" placeholder="Vaqt (min)" class="input-style w-32" value="10">
            </div>
            <button id="btn-save-test" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">SAQLASH</button>
            <button id="close-test-modal" class="w-full mt-4 text-slate-400 font-bold">Yopish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk_5A1NI8rEI-RPEy5-SmVHQl_MgVthnY",
            authDomain: "bilim-crm-90d31.firebaseapp.com",
            projectId: "bilim-crm-90d31",
            storageBucket: "bilim-crm-90d31.firebasestorage.app",
            messagingSenderId: "916429053971",
            appId: "1:916429053971:web:3ce6cab1bc431103739fe6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserType = ""; 
        let currentStudentData = null;
        let questions = []; 
        let currentQ = 0; 
        let score = 0;
        let timerInterval;

        // --- AUTH & TABS ---
        const toggleAuthTabs = (type) => {
            const isAdmin = type === 'admin';
            document.getElementById('form-admin').classList.toggle('hidden', !isAdmin);
            document.getElementById('form-student').classList.toggle('hidden', isAdmin);
            document.getElementById('tab-admin').className = isAdmin ? 'flex-1 py-2 rounded-xl font-bold bg-white shadow-sm text-blue-600' : 'flex-1 py-2 rounded-xl font-bold text-slate-500';
            document.getElementById('tab-student').className = !isAdmin ? 'flex-1 py-2 rounded-xl font-bold bg-white shadow-sm text-blue-600' : 'flex-1 py-2 rounded-xl font-bold text-slate-500';
        };

        document.getElementById('tab-admin').onclick = () => toggleAuthTabs('admin');
        document.getElementById('tab-student').onclick = () => toggleAuthTabs('student');

        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value)
                .then(() => { currentUserType = "admin"; })
                .catch(err => alert("Xato: " + err.message));
        };

        document.getElementById('stu-login-btn').onclick = async () => {
            const id = document.getElementById('stu-id-input').value;
            const snap = await getDocs(collection(db, "students"));
            let user = null;
            snap.forEach(d => { if(d.data().tg === id) user = d.data(); });
            if(user) {
                currentStudentData = user;
                currentUserType = "student";
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                setupUI();
            } else alert("ID topilmadi!");
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserType = "admin";
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                setupUI();
            }
        });

        function setupUI() {
            if(currentUserType === "student") {
                document.getElementById('btn-nav-stu').classList.add('hidden');
                document.getElementById('open-test-modal').classList.add('hidden');
            }
            syncStudents();
            loadResults();
            loadQuizzes();
        }

        // --- NAVIGATION ---
        const sections = ['dash', 'stu', 'test', 'res'];
        sections.forEach(s => {
            document.getElementById(`btn-nav-${s}`).onclick = () => {
                sections.forEach(sec => {
                    document.getElementById(`sec-${sec}`).classList.add('hidden');
                    document.getElementById(`btn-nav-${sec}`).classList.remove('active-nav');
                });
                document.getElementById(`sec-${s}`).classList.remove('hidden');
                document.getElementById(`btn-nav-${s}`).classList.add('active-nav');
            }
        });

        // --- CORE LOGIC ---
        function syncStudents() {
            onSnapshot(collection(db, "students"), (snap) => {
                const list = document.getElementById('stu-list');
                list.innerHTML = ""; let count = 0;
                snap.forEach(d => {
                    count++;
                    const s = d.data();
                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-slate-50 transition";
                    tr.innerHTML = `<td class="p-4 font-bold">${s.name}</td><td class="p-4 text-slate-500">${s.tg}</td><td class="p-4 text-center"><button onclick="deleteDoc(doc(db, 'students', '${d.id}'))" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button></td>`;
                    list.appendChild(tr);
                });
                document.getElementById('dash-stu-count').innerText = count;
            });
        }

        document.getElementById('btn-save-student').onclick = async () => {
            const name = document.getElementById('s-name').value;
            const tg = document.getElementById('s-tg').value;
            if(name && tg) {
                await addDoc(collection(db, "students"), { name, tg });
                document.getElementById('stu-modal').classList.add('hidden');
                document.getElementById('s-name').value = ""; document.getElementById('s-tg').value = "";
            }
        };

        async function loadQuizzes() {
            const snap = await getDocs(collection(db, "quizzes"));
            questions = []; snap.forEach(d => questions.push(d.data()));
            if(questions.length > 0) renderQ();
        }

        function startTimer(min) {
            let time = min * 60;
            document.getElementById('timer-display').classList.remove('hidden');
            timerInterval = setInterval(() => {
                time--;
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('time-left').innerText = `${m}:${s<10?'0'+s:s}`;
                if(time <= 0) finishTest();
            }, 1000);
        }

        function renderQ() {
            if(currentQ === 0) startTimer(questions[0].duration || 10);
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = `${currentQ + 1}. ${q.q}`;
            const box = document.getElementById('q-options'); box.innerHTML = "";
            ['a','b','c','d'].forEach(o => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition font-bold flex items-center space-x-4";
                btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-xs font-black">${o.toUpperCase()}</span><span>${q[o]}</span>`;
                btn.onclick = () => {
                    if(o === q.cor) score++;
                    if(currentQ < questions.length - 1) { currentQ++; renderQ(); }
                    else finishTest();
                };
                box.appendChild(btn);
            });
        }

        async function finishTest() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').classList.add('hidden');
            document.getElementById('quiz-box').classList.add('hidden');
            document.getElementById('result-box').classList.remove('hidden');
            const p = Math.round((score/questions.length)*100) + "%";
            document.getElementById('final-percent').innerText = p;
            
            await addDoc(collection(db, "results"), {
                name: currentUserType === 'admin' ? "Admin" : currentStudentData.name,
                id: currentUserType === 'admin' ? "admin" : currentStudentData.tg,
                score: p,
                date: new Date().toLocaleString()
            });
        }

        function loadResults() {
            onSnapshot(collection(db, "results"), (snap) => {
                const list = document.getElementById('res-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    if(currentUserType === "student" && r.id !== currentStudentData.tg) return;
                    const tr = document.createElement('tr');
                    tr.className = "border-b";
                    tr.innerHTML = `<td class="p-4 font-bold">${r.name}</td><td class="p-4 text-blue-600 font-black">${r.score}</td><td class="p-4 text-slate-400 text-sm">${r.date}</td>`;
                    list.appendChild(tr);
                });
            });
        }

        document.getElementById('btn-save-test').onclick
